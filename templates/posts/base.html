<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}找室友{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; color: #222; }
        a { color: #0b63ce; text-decoration: none; }
        .container { max-width: 1100px; margin: 0 auto; }
        .flash { background: #f3f7ff; border: 1px solid #cfe0ff; padding: 10px 12px; margin-bottom: 16px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .grid { display: grid; gap: 16px; }
        .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .muted { color: #666; }
        img.cover { width: 100%; max-width: 360px; height: 220px; object-fit: cover; border-radius: 8px; }
        input, textarea, select { width: 100%; box-sizing: border-box; padding: 8px 10px; margin-top: 4px; }
        label { display: block; margin-bottom: 12px; }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
        .btn { display: inline-block; border: 1px solid #0b63ce; background: #0b63ce; color: #fff; padding: 8px 14px; border-radius: 6px; cursor: pointer; }
        .btn.secondary { background: #fff; color: #0b63ce; }
        .btn.danger { border-color: #d03b3b; background: #d03b3b; }
        .btn.inline { line-height: 1.2; }
        .list-cover { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; background: #f2f2f2; }
    </style>
</head>
<body>
{% include "navbar.html" %}
<div class="container">

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>
</body>
</html>
