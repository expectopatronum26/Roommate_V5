{% extends "base.html" %}

{% block title %}帖子列表{% endblock %}

{% block content %}
<style>
    .ai-assistant-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
    }
    .ai-assistant-form {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 12px;
    }
    .ai-assistant-form input {
        margin-top: 0;
        flex: 1;
    }
    .ai-assistant-counter {
        margin-top: 6px;
        font-size: 12px;
    }
    .ai-assistant-result {
        margin-top: 12px;
        border-top: 1px solid #eee;
        padding-top: 10px;
    }
    .ai-assistant-result[hidden] {
        display: none;
    }
    .ai-assistant-result-toggle {
        border: 0;
        background: transparent;
        color: #0b63ce;
        cursor: pointer;
        padding: 0;
    }
    .ai-assistant-content p {
        margin: 8px 0;
    }
    .ai-assistant-content ul,
    .ai-assistant-content ol {
        margin: 8px 0;
        padding-left: 20px;
    }
    .ai-assistant-error {
        color: #b00020;
    }
    .filter-row {
        grid-column: 1 / -1;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
    }
    .rent-tag {
        cursor: pointer;
        padding: 2px 8px;
    }
    .rent-tag.active {
        font-weight: bold;
        text-decoration: underline;
    }
    .rent-input {
        flex: 0 1 5em;
        min-width: 3em;
    }
</style>

<div class="card" id="ai-assistant-card">
    <div class="ai-assistant-header">
        <h3 style="margin: 0;">AI 搜索助手</h3>
    </div>
    <form id="ai-assistant-form" class="ai-assistant-form" novalidate>
        <input id="ai-assistant-input" type="text" maxlength="200" placeholder="例如：我想找旺角附近3000以下的两室房" aria-label="AI搜索输入">
        <button id="ai-assistant-submit" class="btn" type="submit">发送</button>
    </form>
    <div id="ai-assistant-counter" class="ai-assistant-counter muted">已输入 0/200 字</div>
    <div id="ai-assistant-result" class="ai-assistant-result" hidden>
        <button id="ai-assistant-toggle" type="button" class="ai-assistant-result-toggle" aria-expanded="true">收起回答</button>
        <div id="ai-assistant-content" class="ai-assistant-content" style="margin-top: 8px;"></div>
    </div>
</div>

<div class="card">
    <form id="filter-form" method="get" action="{{ url_for('posts.list_posts') }}" class="grid grid-2">
        <input type="hidden" id="hidden-min-rent" name="min_rent" value="{{ filters.min_rent }}">
        <input type="hidden" id="hidden-max-rent" name="max_rent" value="{{ filters.max_rent }}">
        <label>位置
            <select name="location">
                <option value="" {% if not filters.location %}selected{% endif %}>不限</option>
                <option value="港岛" {% if filters.location == '港岛' %}selected{% endif %}>港岛</option>
                <option value="九龙" {% if filters.location == '九龙' %}selected{% endif %}>九龙</option>
                <option value="新界" {% if filters.location == '新界' %}selected{% endif %}>新界</option>
                <option value="离岛" {% if filters.location == '离岛' %}selected{% endif %}>离岛</option>
            </select>
        </label>
        <label>附近学校
            <select name="nearby_school">
                <option value="" {% if not filters.nearby_school %}selected{% endif %}>不限</option>
                <option value="HKU" {% if filters.nearby_school == 'HKU' %}selected{% endif %}>香港大学</option>
                <option value="CUHK" {% if filters.nearby_school == 'CUHK' %}selected{% endif %}>香港中文大学</option>
                <option value="HKUST" {% if filters.nearby_school == 'HKUST' %}selected{% endif %}>香港科技大学</option>
                <option value="PolyU" {% if filters.nearby_school == 'PolyU' %}selected{% endif %}>香港理工大学</option>
                <option value="CityU" {% if filters.nearby_school == 'CityU' %}selected{% endif %}>香港城市大学</option>
                <option value="HKBU" {% if filters.nearby_school == 'HKBU' %}selected{% endif %}>香港浸会大学</option>
                <option value="LU" {% if filters.nearby_school == 'LU' %}selected{% endif %}>岭南大学</option>
                <option value="EdUHK" {% if filters.nearby_school == 'EdUHK' %}selected{% endif %}>香港教育大学</option>
            </select>
        </label>
        <div class="filter-row">
            <span>月租</span>
            <button type="button" class="rent-tag {% if filters.min_rent == '' and filters.max_rent == '' %}active{% endif %}" data-min="" data-max="">不限</button>
            <button type="button" class="rent-tag {% if filters.min_rent == '' and filters.max_rent == '3000' %}active{% endif %}" data-min="" data-max="3000">3000以下</button>
            <button type="button" class="rent-tag {% if filters.min_rent == '3000' and filters.max_rent == '5000' %}active{% endif %}" data-min="3000" data-max="5000">3000-5000</button>
            <button type="button" class="rent-tag {% if filters.min_rent == '5000' and filters.max_rent == '8000' %}active{% endif %}" data-min="5000" data-max="8000">5000-8000</button>
            <button type="button" class="rent-tag {% if filters.min_rent == '8000' and filters.max_rent == '10000' %}active{% endif %}" data-min="8000" data-max="10000">8000-10000</button>
            <button type="button" class="rent-tag {% if filters.min_rent == '10000' and filters.max_rent == '15000' %}active{% endif %}" data-min="10000" data-max="15000">10000-15000</button>
            <button type="button" class="rent-tag {% if filters.min_rent == '15000' and filters.max_rent == '' %}active{% endif %}" data-min="15000" data-max="">15000以上</button>
            <input id="min-rent" class="rent-input" type="number" step="100" name="custom_min_rent" value="{% if filters.min_rent and (filters.min_rent, filters.max_rent) not in [('', ''), ('', '3000'), ('3000', '5000'), ('5000', '8000'), ('8000', '10000'), ('10000', '15000'), ('15000', '')] %}{{ filters.min_rent }}{% endif %}" placeholder="最低" aria-label="最低月租">
            <span>-</span>
            <input id="max-rent" class="rent-input" type="number" step="100" name="custom_max_rent" value="{% if filters.max_rent and (filters.min_rent, filters.max_rent) not in [('', ''), ('', '3000'), ('3000', '5000'), ('5000', '8000'), ('8000', '10000'), ('10000', '15000'), ('15000', '')] %}{{ filters.max_rent }}{% endif %}" placeholder="最高" aria-label="最高月租">
            <span>港币</span>
        </div>
        <label>户型
            <input type="text" name="layout" value="{{ filters.layout }}" placeholder="例如：2室1厅">
        </label>
        <div style="align-self:end;">
            <button class="btn" type="submit">筛选</button>
            <a class="btn secondary inline" href="{{ url_for('posts.new_post') }}">发布新帖子</a>
        </div>
    </form>
</div>

<script>
    (function () {
        var aiForm = document.getElementById("ai-assistant-form");
        var aiInput = document.getElementById("ai-assistant-input");
        var aiSubmit = document.getElementById("ai-assistant-submit");
        var aiResult = document.getElementById("ai-assistant-result");
        var aiToggle = document.getElementById("ai-assistant-toggle");
        var aiContent = document.getElementById("ai-assistant-content");
        var aiCounter = document.getElementById("ai-assistant-counter");
        var form = document.getElementById("filter-form");
        var hiddenMinInput = document.getElementById("hidden-min-rent");
        var hiddenMaxInput = document.getElementById("hidden-max-rent");
        var minInput = document.getElementById("min-rent");
        var maxInput = document.getElementById("max-rent");
        var tags = document.querySelectorAll(".rent-tag");

        function setActive(target) {
            tags.forEach(function (tag) {
                tag.classList.remove("active");
            });
            if (target) {
                target.classList.add("active");
            }
        }

        tags.forEach(function (tag) {
            tag.addEventListener("click", function () {
                hiddenMinInput.value = tag.getAttribute("data-min") || "";
                hiddenMaxInput.value = tag.getAttribute("data-max") || "";
                minInput.value = "";
                maxInput.value = "";
                setActive(tag);
            });
        });

        function onCustomRentInput() {
            setActive(null);
            hiddenMinInput.value = "";
            hiddenMaxInput.value = "";
        }

        minInput.addEventListener("input", onCustomRentInput);
        maxInput.addEventListener("input", onCustomRentInput);

        form.addEventListener("submit", function () {
            if (minInput.value || maxInput.value) {
                hiddenMinInput.value = minInput.value;
                hiddenMaxInput.value = maxInput.value;
            }
        });

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function updateAssistantCounter() {
            var value = aiInput.value || "";
            if (value.length > 200) {
                value = value.slice(0, 200);
                aiInput.value = value;
            }
            aiCounter.textContent = "已输入 " + value.length + "/200 字";
        }

        function setAssistantLoading(isLoading) {
            aiSubmit.disabled = isLoading;
            aiSubmit.textContent = isLoading ? "发送中..." : "发送";
        }

        function showAssistantText(content, isError, isHtml) {
            aiResult.hidden = false;
            aiToggle.setAttribute("aria-expanded", "true");
            aiToggle.textContent = "收起回答";
            aiContent.style.display = "block";
            aiContent.classList.toggle("ai-assistant-error", Boolean(isError));
            if (isError) {
                aiContent.innerHTML = "<p>" + escapeHtml(content) + "</p>";
                return;
            }
            aiContent.innerHTML = isHtml ? (content || "") : "<p>" + escapeHtml(content) + "</p>";
        }

        aiToggle.addEventListener("click", function () {
            var expanded = aiToggle.getAttribute("aria-expanded") === "true";
            aiToggle.setAttribute("aria-expanded", String(!expanded));
            aiToggle.textContent = expanded ? "展开回答" : "收起回答";
            aiContent.style.display = expanded ? "none" : "block";
        });

        aiForm.addEventListener("submit", function (event) {
            event.preventDefault();
            var message = (aiInput.value || "").trim();
            if (!message) {
                showAssistantText("请输入找房需求后再发送。", true, false);
                return;
            }

            setAssistantLoading(true);
            fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ message: message }),
            })
                .then(function (response) {
                    return response.json().then(function (data) {
                        if (!response.ok) {
                            var errorMessage = (data && data.error) || "AI助手暂时不可用，请稍后再试。";
                            throw new Error(errorMessage);
                        }
                        return data;
                    });
                })
                .then(function (data) {
                    showAssistantText((data && data.answer_html) || (data && data.answer) || "没有收到AI回答，请稍后再试。", false, Boolean(data && data.answer_html));
                })
                .catch(function (error) {
                    showAssistantText(error.message || "AI助手暂时不可用，请稍后再试。", true, false);
                })
                .finally(function () {
                    setAssistantLoading(false);
                });
        });

        aiInput.addEventListener("input", updateAssistantCounter);
        updateAssistantCounter();

    })();
</script>

{% if posts %}
    <div class="grid grid-2">
        {% for item in posts %}
            <div class="card">
                <a href="{{ url_for('posts.post_detail', post_id=item.post.id) }}">
                    <img class="list-cover" src="{{ item.cover_url }}" alt="帖子封面">
                </a>
                <h3><a href="{{ url_for('posts.post_detail', post_id=item.post.id) }}">{{ item.post.title }}</a></h3>
                <p>月租：{{ item.post.rent }}</p>
                <p>位置：{{ item.post.location }}</p>
            </div>
        {% endfor %}
    </div>
{% else %}
    <div class="card">暂无帖子</div>
{% endif %}
{% endblock %}
