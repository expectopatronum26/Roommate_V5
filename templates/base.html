<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Roommate Finder{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── CSS Custom Properties ── */
    :root {
      /* Backgrounds */
      --color-bg:               #FFFBFE;
      --color-surface:          #F3EDF7;
      --color-surface-low:      #E7E0EC;

      /* Primary */
      --color-primary:          #6750A4;
      --color-on-primary:       #FFFFFF;
      --color-primary-container:#EADDFF;

      /* Secondary */
      --color-secondary-container:    #E8DEF8;
      --color-on-secondary-container: #1D192B;

      /* Accent */
      --color-lavender-soft:    #bdbbff;

      /* Text */
      --color-on-surface:         #1C1B1F;
      --color-on-surface-variant: #49454F;

      /* Borders */
      --color-outline:        #79747E;
      --color-outline-subtle: rgba(0, 0, 0, 0.08);

      /* Gradient（仅装饰用） */
      --gradient-pastel: linear-gradient(135deg, #EAE4FF 0%, #E8DEF8 40%, #F0ECFF 100%);

      /* Shape */
      --radius-xs:   4px;
      --radius-sm:   8px;
      --radius-md:   12px;
      --radius-lg:   16px;
      --radius-pill: 9999px;

      /* Typography */
      --font-display: 'Plus Jakarta Sans', 'Noto Sans SC', sans-serif;
      --font-mono:    'JetBrains Mono', 'IBM Plex Mono', monospace;
    }

    /* ── Base ── */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      background: var(--color-bg);
      color: var(--color-on-surface);
      font-family: var(--font-display);
      margin: 0;
    }

    /* ── Responsive Container ── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* Tablet: 768px – 1199px */
    @media (max-width: 1199px) {
      .container {
        padding: 0 32px;
      }
    }

    /* Mobile: ≤ 767px */
    @media (max-width: 767px) {
      .container {
        padding: 0 16px;
      }
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

  {% include "navbar.html" %}

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>© 2025 Roommate Finder HK</p>
  </footer>

  <style>
    footer {
      text-align: center;
      padding: 24px;
      color: var(--color-on-surface-variant);
      font-size: 14px;
      border-top: 1px solid var(--color-outline-subtle);
    }

    footer p {
      margin: 0;
    }
  </style>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
