<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的收藏 - 找室友</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ff6b35;
            --secondary-color: #f8f9fa;
            --text-color: #424242;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            background: var(--secondary-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .profile-header {
            background: var(--primary-color);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 20px 20px;
        }

        .card {
            background: var(--white);
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 16px var(--shadow);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .card-img-top {
            height: 200px;
            object-fit: cover;
        }

        .btn {
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-color);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-outline-light {
            border-color: rgba(255, 255, 255, 0.5);
            color: white;
        }

        .btn-outline-light:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        .badge {
            border-radius: 20px;
            padding: 5px 15px;
        }
    </style>
</head>
<body>
<div class="profile-header">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1>我的收藏</h1>
                <p>您收藏的房源信息</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="{{ url_for('profile.profile') }}" class="btn btn-outline-light">返回个人中心</a>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="row">
        {% for fav in favorites %}
        <div class="col-md-6 mb-4">
            <div class="card h-100">
                <img src="{{ fav.image }}" class="card-img-top" alt="房源图片">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ fav.title }}</h5>
                    <p class="card-text">
                        <strong>位置：</strong>{{ fav.location }}<br>
                        <strong>租金：</strong>HK$ {{ fav.rent }}/月
                    </p>
                    <div class="mt-auto">
                        <span class="badge bg-info">已收藏</span>
                        <a href="#" class="btn btn-primary ms-2">查看详情</a>
                        <a href="#" class="btn btn-outline-danger ms-1">取消收藏</a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
