<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>编辑帖子 - 找室友</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ff6b35;
            --secondary-color: #f8f9fa;
            --text-color: #424242;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            background: var(--secondary-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .profile-header {
            background: var(--primary-color);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 20px 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--shadow);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .btn {
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-color);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            border: none;
        }

        .btn-secondary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="profile-header">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1>编辑帖子</h1>
                <p>修改您的房源信息</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="{{ url_for('profile.posts_list') }}" class="btn btn-outline-light">返回列表</a>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <form method="post" enctype="multipart/form-data">
        <!-- 第一部分：基本信息 -->
        <div class="glass-card">
            <h4>基本信息</h4>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="title" class="form-label">帖子标题</label>
                    <input type="text" class="form-control" id="title" name="title" value="{{ post.title }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="location" class="form-label">位置/区域</label>
                    <select class="form-control" id="location" name="location" required>
                        <option value="">请选择区域</option>
                        <option value="香港岛中环" {% if post.location == '香港岛中环' %}selected{% endif %}>香港岛中环</option>
                        <option value="香港岛西环" {% if post.location == '香港岛西环' %}selected{% endif %}>香港岛西环</option>
                        <option value="香港岛铜锣湾" {% if post.location == '香港岛铜锣湾' %}selected{% endif %}>香港岛铜锣湾</option>
                        <option value="九龙旺角" {% if post.location == '九龙旺角' %}selected{% endif %}>九龙旺角</option>
                        <option value="九龙尖沙咀" {% if post.location == '九龙尖沙咀' %}selected{% endif %}>九龙尖沙咀</option>
                        <option value="九龙油尖旺" {% if post.location == '九龙油尖旺' %}selected{% endif %}>九龙油尖旺</option>
                        <option value="新界沙田" {% if post.location == '新界沙田' %}selected{% endif %}>新界沙田</option>
                        <option value="新界荃湾" {% if post.location == '新界荃湾' %}selected{% endif %}>新界荃湾</option>
                        <option value="新界屯门" {% if post.location == '新界屯门' %}selected{% endif %}>新界屯门</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="community" class="form-label">小区名称</label>
                    <input type="text" class="form-control" id="community" name="community" value="{{ post.get('community', '') }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="layout" class="form-label">户型</label>
                    <input type="text" class="form-control" id="layout" name="layout" value="{{ post.get('layout', '') }}" placeholder="例: 3室2厅">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="room_type" class="form-label">房型</label>
                    <select class="form-control" id="room_type" name="room_type" required>
                        <option value="">请选择房型</option>
                        <option value="单间" {% if post.get('room_type') == '单间' %}selected{% endif %}>单间</option>
                        <option value="合租房" {% if post.get('room_type') == '合租房' %}selected{% endif %}>合租房</option>
                        <option value="主卧" {% if post.get('room_type') == '主卧' %}selected{% endif %}>主卧</option>
                        <option value="工作室" {% if post.get('room_type') == '工作室' %}selected{% endif %}>工作室</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="rent" class="form-label">合租租金(HKD/月)</label>
                    <input type="number" class="form-control" id="rent" name="rent" value="{{ post.rent }}" required>
                </div>
            </div>
        </div>

        <!-- 第二部分：上传房间照片 -->
        <div class="glass-card">
            <h4>房间照片</h4>
            <input type="file" class="form-control" name="photos" multiple accept="image/*">
            <small class="text-muted">可上传多张照片</small>
        </div>

        <!-- 第三部分：我的情况 -->
        <div class="glass-card">
            <h4>我的情况</h4>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="school" class="form-label">就读学校</label>
                    <select class="form-control" id="school" name="school" required>
                        <option value="">请选择学校</option>
                        <option value="香港大学" {% if post.get('school') == '香港大学' %}selected{% endif %}>香港大学</option>
                        <option value="香港中文大学" {% if post.get('school') == '香港中文大学' %}selected{% endif %}>香港中文大学</option>
                        <option value="香港科技大学" {% if post.get('school') == '香港科技大学' %}selected{% endif %}>香港科技大学</option>
                        <option value="香港理工大学" {% if post.get('school') == '香港理工大学' %}selected{% endif %}>香港理工大学</option>
                        <option value="香港浸会大学" {% if post.get('school') == '香港浸会大学' %}selected{% endif %}>香港浸会大学</option>
                        <option value="香港城市大学" {% if post.get('school') == '香港城市大学' %}selected{% endif %}>香港城市大学</option>
                        <option value="岭南大学" {% if post.get('school') == '岭南大学' %}selected{% endif %}>岭南大学</option>
                        <option value="香港教育大学" {% if post.get('school') == '香港教育大学' %}selected{% endif %}>香港教育大学</option>
                        <option value="香港公开大学" {% if post.get('school') == '香港公开大学' %}selected{% endif %}>香港公开大学</option>
                        <option value="香港珠海学院" {% if post.get('school') == '香港珠海学院' %}selected{% endif %}>香港珠海学院</option>
                        <option value="树仁大学" {% if post.get('school') == '树仁大学' %}selected{% endif %}>树仁大学</option>
                        <option value="恒生大学" {% if post.get('school') == '恒生大学' %}selected{% endif %}>恒生大学</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="major" class="form-label">专业</label>
                    <input type="text" class="form-control" id="major" name="major" value="{{ post.get('major', '') }}">
                </div>
                <div class="col-md-12 mb-3">
                    <label for="bio" class="form-label">简介</label>
                    <textarea class="form-control" id="bio" name="bio" rows="3">{{ post.get('bio', '') }}</textarea>
                </div>
            </div>
        </div>

        <!-- 第四部分：对室友的期望 -->
        <div class="glass-card">
            <h4>对室友的期望</h4>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="schedule" class="form-label">作息时间</label>
                    <input type="text" class="form-control" id="schedule" name="schedule" value="{{ post.get('schedule', '') }}" placeholder="例: 23:00前睡觉，早起型">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="cleaning" class="form-label">卫生频次</label>
                    <input type="text" class="form-control" id="cleaning" name="cleaning" value="{{ post.get('cleaning', '') }}" placeholder="例: 每周打扫一次公共区域">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="chores" class="form-label">家务分配</label>
                    <input type="text" class="form-control" id="chores" name="chores" value="{{ post.get('chores', '') }}" placeholder="例: 轮流打扫，各管各的厨房">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="requirements" class="form-label">其他要求</label>
                    <textarea class="form-control" id="requirements" name="requirements" rows="3">{{ post.get('requirements', '') }}</textarea>
                </div>
            </div>
        </div>

        <!-- 第五部分：看房时间段 -->
        <div class="glass-card">
            <h4>看房时间段</h4>
            <div class="mb-3">
                <label class="form-label">星期</label>
                <div>
                    <input type="checkbox" id="mon" name="days" value="周一"> <label for="mon">周一</label>
                    <input type="checkbox" id="tue" name="days" value="周二"> <label for="tue">周二</label>
                    <input type="checkbox" id="wed" name="days" value="周三"> <label for="wed">周三</label>
                    <input type="checkbox" id="thu" name="days" value="周四"> <label for="thu">周四</label>
                    <input type="checkbox" id="fri" name="days" value="周五"> <label for="fri">周五</label>
                    <input type="checkbox" id="sat" name="days" value="周六"> <label for="sat">周六</label>
                    <input type="checkbox" id="sun" name="days" value="周日"> <label for="sun">周日</label>
                </div>
            </div>
            <div class="mb-3">
                <label for="time_slots" class="form-label">时间段</label>
                <input type="text" class="form-control" id="time_slots" name="time_slots" placeholder="例: 10:00-12:00, 14:00-16:00">
                <small class="text-muted">多个时间段用逗号分隔</small>
            </div>
        </div>

        <div class="text-center">
            <button type="submit" name="action" value="draft" class="btn btn-secondary me-3">存草稿</button>
            <button type="submit" name="action" value="publish" class="btn btn-primary">发布</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
