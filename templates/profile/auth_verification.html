<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>身份认证 - 找室友</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ff6b35;
            --secondary-color: #f8f9fa;
            --text-color: #424242;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            background: var(--secondary-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .profile-header {
            background: var(--primary-color);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 20px 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--shadow);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .btn {
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-color);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .auth-upload {
            border: 2px dashed #e0e0e0;
            padding: 3rem;
            text-align: center;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.5);
        }

        .auth-status {
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
<div class="profile-header">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1>身份认证</h1>
                <p>认证后显示学校名称，提升信任度</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="{{ url_for('profile.profile') }}" class="btn btn-outline-light">返回个人中心</a>
            </div>
        </div>
    </div>
</div>

<div class="container">
    {% if user.auth_status == 'verified' %}
    <div class="glass-card auth-status">
        <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
        <h3 class="mt-3">认证成功</h3>
        <p>您的身份已通过验证：{{ user.school }}</p>
        <form method="post" action="{{ url_for('profile.cancel_auth') }}">
            <button type="submit" class="btn btn-outline-danger">取消认证</button>
        </form>
    </div>
    {% elif user.auth_status == 'pending' %}
    <div class="glass-card auth-status">
        <i class="fas fa-clock text-warning" style="font-size: 4rem;"></i>
        <h3 class="mt-3">审核中</h3>
        <p>您的认证资料已提交，正在审核中，请耐心等待。</p>
    </div>
    {% else %}
    <div class="glass-card">
        <h5 class="mb-3">身份认证</h5>
        <form method="post" action="{{ url_for('profile.upload_auth') }}" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="auth_type" class="form-label">认证类型</label>
                <input type="text" class="form-control" id="auth_type" value="学生认证" readonly>
                <small class="text-muted">上传学生证或录取通知书</small>
            </div>
            <div class="mb-3">
                <label for="school" class="form-label">学校/机构</label>
                <select name="school" class="form-control" id="school" required>
                    <option value="">请选择学校</option>
                    <option value="香港大学">香港大学</option>
                    <option value="香港中文大学">香港中文大学</option>
                    <option value="香港科技大学">香港科技大学</option>
                    <option value="香港理工大学">香港理工大学</option>
                    <option value="香港浸会大学">香港浸会大学</option>
                    <option value="香港城市大学">香港城市大学</option>
                    <option value="岭南大学">岭南大学</option>
                    <option value="香港教育大学">香港教育大学</option>
                    <option value="香港公开大学">香港公开大学</option>
                    <option value="香港珠海学院">香港珠海学院</option>
                    <option value="树仁大学">树仁大学</option>
                    <option value="恒生大学">恒生大学</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="auth_file" class="form-label">上传证明文件</label>
                <input type="file" name="auth_file" accept="image/*,.pdf" class="form-control" id="auth_file" required>
                <small class="text-muted">支持 JPG、PNG、PDF 格式，大小不超过 5MB</small>
            </div>
            <button type="submit" class="btn btn-primary">提交认证</button>
        </form>
    </div>
    {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
