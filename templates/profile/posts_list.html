<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的发布 - 找室友</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ff6b35;
            --secondary-color: #f8f9fa;
            --text-color: #424242;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            background: var(--secondary-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .profile-header {
            background: var(--primary-color);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 20px 20px;
        }

        .card {
            background: var(--white);
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 16px var(--shadow);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .card-img-top {
            height: 200px;
            object-fit: cover;
        }

        .btn {
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-color);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-outline-light {
            border-color: rgba(255, 255, 255, 0.5);
            color: white;
        }

        .btn-outline-light:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        .badge {
            border-radius: 20px;
            padding: 5px 15px;
        }
    </style>
</head>
<body>
{% include "navbar.html" %}
<div class="profile-header">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1>我的发布</h1>
                <p>管理您的房源信息</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="{{ url_for('profile.profile') }}" class="btn btn-outline-light">返回个人中心</a>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="row">
        {% for item in posts %}
        <div class="col-md-6 mb-4">
            <div class="card h-100">
                <!--使用实际上传的图片 -->
                <img src="{{ item.cover_url }}" class="card-img-top" alt="{{ item.post.title }}">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ item.post.title }}</h5>  <!--👈 改为 item.post -->
                    <p class="card-text">
                        <strong>位置：</strong>{{ item.post.location }}<br>
                        <strong>租金：</strong>HK$ {{ item.post.rent }}/月<br>
                        <strong>发布时间：</strong>{{ item.post.created_at.strftime('%Y-%m-%d %H:%M') if item.post.created_at else '' }}
                    </p>
                    <div class="mt-auto">
                        <span class="badge bg-success">已发布</span>
                        <a href="{{ url_for('posts.post_detail', post_id=item.post.id) }}" class="btn btn-sm btn-info ms-1">
                            <i class="fas fa-eye"></i> 查看
                        </a>
                        <a href="{{ url_for('posts.edit_post', post_id=item.post.id) }}" class="btn btn-sm btn-primary ms-1">
                            <i class="fas fa-edit"></i> 编辑
                        </a>
                        <form method="post" action="{{ url_for('posts.delete_post', post_id=item.post.id) }}"
                              style="display:inline;"
                              onsubmit="return confirm('确定要删除这个帖子吗？');">
                            <button type="submit" class="btn btn-sm btn-outline-danger ms-1">
                                <i class="fas fa-trash"></i> 删除
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
