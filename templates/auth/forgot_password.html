<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>忘记密码 - 找室友</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%); min-height: 100vh; display: flex; align-items: center; }
        .forgot-container { max-width: 400px; margin: 0 auto; padding: 2rem; }
        .card { border: none; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .password-container { position: relative; }
        .password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; }
    </style>
</head>
<body>
<div class="container">
    <div class="forgot-container">
        <div class="card">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">忘记密码</h2>

                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-info">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">验证码</label>
                        <div class="input-group">
                            <input type="text" class="form-control" name="code" required>
                            <button type="submit" formaction="{{ url_for('auth.forgot_password') }}" class="btn btn-outline-secondary">获取验证码</button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新密码</label>
                        <div class="password-container">
                            <input type="password" class="form-control" name="new_password" id="new-password" required>
                            <i class="fas fa-eye password-toggle" onclick="togglePassword('new-password')"></i>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认新密码</label>
                        <div class="password-container">
                            <input type="password" class="form-control" name="confirm_new_password" id="confirm-new-password" required>
                            <i class="fas fa-eye password-toggle" onclick="togglePassword('confirm-new-password')"></i>
                        </div>
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary">重置密码</button>
                    </div>
                </form>

                <hr class="my-4">
                <p class="text-center mb-0"><a href="{{ url_for('auth.login') }}">返回登录</a></p>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    const icon = input.nextElementSibling;
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}
</script>
</body>
</html>
