<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>注册 - 找室友</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%); min-height: 100vh; display: flex; align-items: center; }
        .register-container { max-width: 400px; margin: 0 auto; padding: 2rem; }
        .card { border: none; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .btn-google { background: #db4437; color: white; border: none; }
        .btn-google:hover { background: #c23321; }
        .btn-facebook { background: #4267B2; color: white; border: none; }
        .btn-facebook:hover { background: #365899; }
        .divider { text-align: center; position: relative; margin: 2rem 0; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #e0e0e0; }
        .divider span { background: white; padding: 0 1rem; color: #666; }
        .password-container { position: relative; }
        .password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; }
        .nav-tabs .nav-link { border: none; background: none; color: #666; }
        .nav-tabs .nav-link.active { background: none; border-bottom: 2px solid #667eea; color: #667eea; }
    </style>
</head>
<body>
<div class="container">
    <div class="register-container">
        <div class="card">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">注册</h2>

                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <!-- 注册方式切换 -->
                <ul class="nav nav-tabs justify-content-center mb-3" id="registerTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="email-reg-tab" data-bs-toggle="tab" data-bs-target="#email-reg" type="button" role="tab">邮箱注册</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="phone-reg-tab" data-bs-toggle="tab" data-bs-target="#phone-reg" type="button" role="tab">手机号注册</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <!-- 邮箱注册 -->
                    <div class="tab-pane fade show active" id="email-reg" role="tabpanel">
                        <form method="post">
                            <div class="mb-3">
                                <label class="form-label">邮箱</label>
                                <input type="email" class="form-control" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <div class="password-container">
                                    <input type="password" class="form-control" name="password" id="reg-password-email" required>
                                    <i class="fas fa-eye password-toggle" onclick="togglePassword('reg-password-email')"></i>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">确认密码</label>
                                <div class="password-container">
                                    <input type="password" class="form-control" name="confirm_password" id="reg-confirm-email" required>
                                    <i class="fas fa-eye password-toggle" onclick="togglePassword('reg-confirm-email')"></i>
                                </div>
                            </div>
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary">注册</button>
                            </div>
                        </form>
                    </div>

                    <!-- 手机号注册 -->
                    <div class="tab-pane fade" id="phone-reg" role="tabpanel">
                        <form method="post">
                            <div class="mb-3">
                                <label class="form-label">手机号</label>
                                <input type="tel" class="form-control" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <div class="password-container">
                                    <input type="password" class="form-control" name="password" id="reg-password-phone" required>
                                    <i class="fas fa-eye password-toggle" onclick="togglePassword('reg-password-phone')"></i>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">确认密码</label>
                                <div class="password-container">
                                    <input type="password" class="form-control" name="confirm_password" id="reg-confirm-phone" required>
                                    <i class="fas fa-eye password-toggle" onclick="togglePassword('reg-confirm-phone')"></i>
                                </div>
                            </div>
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary">注册</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="divider">
                    <span>或</span>
                </div>

                <!-- 第三方注册 -->
                <div class="d-grid gap-2">
                    <button class="btn btn-google"><i class="fab fa-google me-2"></i>使用 Google 注册</button>
                    <button class="btn btn-facebook"><i class="fab fa-facebook-f me-2"></i>使用 Facebook 注册</button>
                </div>

                <hr class="my-4">
                <p class="text-center mb-0">已有账号？<a href="{{ url_for('auth.login') }}">登录</a></p>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    const icon = input.nextElementSibling;
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}
</script>
</body>
</html>
